<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tacotron</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #05080f;
  --panel:     #0a0e1a;
  --card:      #0f1525;
  --border:    rgba(255,255,255,0.06);
  --gold:      #F2A90A;
  --gold2:     #B87D00;
  --gold-glow: rgba(242,169,10,0.15);
  --blue:      #2B7FFF;
  --blue-soft: #6AABFF;
  --text:      #E8EDF8;
  --muted:     #6B778F;
  --dim:       #2E364A;
  --red:       rgba(239,68,68,0.12);
  --red-text:  #FCA5A5;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

/* ── CANVAS ── */
#cv { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

/* ── LAYOUT ── */
.shell { position: relative; z-index: 1; display: flex; height: 100vh; justify-content: center; }
.shell-inner { display: flex; width: 100%; max-width: 680px; height: 100vh; overflow: hidden; }

/* ══════════════════ SIDEBAR ══════════════════ */
.sidebar {
  width: 260px; flex-shrink: 0;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: width .25s ease, opacity .25s ease;
  overflow: hidden;
}
.sidebar.collapsed {
  width: 0; opacity: 0; border-right: none; pointer-events: none;
}

.sb-head {
  padding: 20px 16px 14px;
  border-bottom: 1px solid var(--border);
}

.logo {
  display: flex; align-items: center; gap: 10px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 18px; font-weight: 700;
}

.logo-icon { width: 34px; height: 34px; flex-shrink: 0; }

.logo-text {
  background: linear-gradient(120deg, var(--gold), var(--blue-soft));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.logo-sub {
  font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
  color: var(--dim); font-family: 'Inter', sans-serif; margin-top: 1px;
}

.new-btn {
  display: flex; align-items: center; gap: 8px;
  margin: 12px 10px 6px;
  padding: 9px 13px;
  background: rgba(242,169,10,0.06);
  border: 1px solid rgba(242,169,10,0.14);
  border-radius: 10px;
  color: var(--muted); font-size: 13px; cursor: pointer;
  transition: all .2s; width: calc(100% - 20px);
  font-family: 'Inter', sans-serif;
}
.new-btn:hover { background: rgba(242,169,10,0.12); color: var(--text); border-color: rgba(242,169,10,0.3); }

.sb-label {
  padding: 10px 16px 4px;
  font-size: 10px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--dim);
}

.conv-list { flex: 1; overflow-y: auto; padding: 2px 8px 8px; }
.conv-list::-webkit-scrollbar { width: 3px; }
.conv-list::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }

.conv-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 8px; border: 1px solid transparent;
  cursor: pointer; color: var(--muted); font-size: 13px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: all .15s;
}
.conv-item:hover { background: rgba(255,255,255,0.03); color: var(--text); }
.conv-item.on { background: rgba(242,169,10,0.06); border-color: rgba(242,169,10,0.16); color: var(--text); }
.conv-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--dim); flex-shrink: 0; }
.conv-item.on .conv-dot { background: var(--gold); box-shadow: 0 0 5px var(--gold); }

.sb-foot {
  padding: 10px; border-top: 1px solid var(--border);
  display: flex; gap: 6px;
}
.sb-foot-btn {
  flex: 1; padding: 7px 6px;
  background: rgba(255,255,255,0.02); border: 1px solid var(--border);
  border-radius: 8px; color: var(--muted); font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: all .15s; font-family: 'Inter', sans-serif;
}
.sb-foot-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }

/* ══════════════════ MAIN ══════════════════ */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }

/* ── TOPBAR ── */
.topbar {
  flex-shrink: 0; height: 56px;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(5,8,15,0.9);
  backdrop-filter: blur(16px);
  display: flex; align-items: center; justify-content: space-between;
}

.model-pill {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 12px; border-radius: 20px;
  background: rgba(255,255,255,0.03); border: 1px solid var(--border);
  font-size: 13px; font-family: 'Space Grotesk', sans-serif;
}
.mpulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold); box-shadow: 0 0 6px var(--gold);
  animation: mpulse 2.4s ease-in-out infinite;
}
@keyframes mpulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
.mname { color: var(--gold); font-weight: 600; }

.top-actions { display: flex; gap: 6px; }
.icon-btn {
  width: 32px; height: 32px; border-radius: 8px;
  background: rgba(255,255,255,0.02); border: 1px solid var(--border);
  cursor: pointer; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.icon-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.icon-btn.active { color: var(--gold); border-color: rgba(242,169,10,0.3); background: rgba(242,169,10,0.06); }

/* ── MESSAGES ── */
.msgs {
  flex: 1; overflow-y: auto;
  padding: 0; /* no padding — handled per-section */
  display: flex; flex-direction: column;
  scroll-behavior: smooth;
}
.msgs::-webkit-scrollbar { width: 4px; }
.msgs::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 4px; }

/* ── WELCOME ── */
.welcome {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 24px; padding: 48px 32px; text-align: center;
  animation: fadeUp .5s ease;
}

.w-icon {
  width: 72px; height: 72px; position: relative;
  animation: wfloat 4s ease-in-out infinite;
}
.w-icon::before {
  content:''; position:absolute; inset:-16px; border-radius:50%;
  background: radial-gradient(circle, var(--gold-glow), transparent 65%);
  animation: wpulse 3s ease-in-out infinite;
}
@keyframes wfloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes wpulse { 0%,100%{opacity:.8;transform:scale(1)} 50%{opacity:.2;transform:scale(1.3)} }

.w-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 28px; font-weight: 700; letter-spacing: -.03em;
  background: linear-gradient(110deg, var(--text) 40%, var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.w-sub { color: var(--muted); font-size: 14px; line-height: 1.6; max-width: 340px; }

.chips {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; max-width: 480px; width: 100%;
}
.chip {
  background: rgba(255,255,255,0.02); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 14px;
  cursor: pointer; text-align: left; transition: all .2s;
}
.chip:hover {
  background: rgba(242,169,10,0.05);
  border-color: rgba(242,169,10,0.22);
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(242,169,10,0.06);
}
.chip-icon { font-size: 16px; margin-bottom: 5px; }
.chip-title { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.chip-sub { font-size: 11px; color: var(--muted); line-height: 1.4; }

/* ── MESSAGE ROWS ── */
.msg-group {
  padding: 20px 28px 0;
  display: flex; flex-direction: column; gap: 2px;
  animation: fadeUp .22s ease;
}
.msg-group:last-child { padding-bottom: 20px; }

@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

.msg-group.user { align-items: flex-end; }
.msg-group.ai   { align-items: flex-start; }

.msg-sender {
  display: flex; align-items: center; gap: 7px;
  margin-bottom: 5px;
  font-size: 11px; font-weight: 600; letter-spacing: .04em;
  text-transform: uppercase;
}
.msg-group.user .msg-sender { flex-direction: row-reverse; }

.av {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}
.av.ai {
  background: linear-gradient(135deg, var(--gold2), var(--gold));
  color: #05080f;
  font-family: 'Space Grotesk', sans-serif;
}
.av.user {
  background: rgba(43,127,255,0.15);
  border: 1px solid rgba(43,127,255,0.3);
  color: var(--blue-soft);
}

.sender-name { color: var(--muted); }
.msg-group.ai   .sender-name { color: var(--gold); }
.msg-group.user .sender-name { color: var(--blue-soft); }

/* ── BUBBLES ── */
.bubble {
  max-width: min(640px, 75vw);
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 14px; line-height: 1.7;
  word-break: break-word;
}

.bubble.ai {
  background: var(--card);
  border: 1px solid rgba(242,169,10,0.1);
  border-top-left-radius: 4px;
  color: var(--text);
}

.bubble.user {
  background: rgba(43,127,255,0.1);
  border: 1px solid rgba(43,127,255,0.25);
  border-top-right-radius: 4px;
  color: var(--text);
}

/* Markdown inside bubbles */
.bubble p { margin: 0 0 8px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px; font-weight: 600; color: var(--gold);
  margin: 12px 0 6px;
}
.bubble h3:first-child { margin-top: 0; }
.bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
.bubble li { margin-bottom: 3px; }
.bubble strong { color: var(--gold); font-weight: 600; }
.bubble em { color: var(--muted); }
.bubble code {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  background: rgba(255,255,255,0.07); padding: 1px 5px;
  border-radius: 4px; color: var(--gold);
}
.bubble pre {
  background: #080c18;
  border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px;
  margin: 10px 0; overflow-x: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px; line-height: 1.6; color: #C9D1E8;
}
.bubble pre code { background: none; padding: 0; color: inherit; font-size: inherit; }
.bubble hr { border: none; border-top: 1px solid var(--dim); margin: 10px 0; }

.msg-time { font-size: 10px; color: var(--dim); margin-top: 4px; padding: 0 2px; }

/* ── TYPING INDICATOR ── */
.typing-row {
  padding: 12px 28px 0;
  display: flex; align-items: center; gap: 10px;
  animation: fadeUp .2s ease;
}

.typing-bubble {
  background: var(--card); border: 1px solid rgba(242,169,10,0.1);
  border-radius: 16px; border-top-left-radius: 4px;
  padding: 12px 16px;
  display: flex; gap: 5px; align-items: center;
}

.td {
  width: 5px; height: 5px; border-radius: 50%;
  animation: tdot 1.3s ease-in-out infinite;
}
.td:nth-child(1) { background: var(--gold);     animation-delay: 0s; }
.td:nth-child(2) { background: var(--muted);    animation-delay: .18s; }
.td:nth-child(3) { background: var(--blue-soft);animation-delay: .36s; }
@keyframes tdot { 0%,60%,100%{transform:translateY(0);opacity:.35} 30%{transform:translateY(-5px);opacity:1} }

/* ── ERROR ── */
.err-box {
  background: var(--red); border: 1px solid rgba(239,68,68,0.2);
  border-radius: 10px; padding: 10px 14px;
  color: var(--red-text); font-size: 13px;
  max-width: min(500px, 75vw);
}

/* ── CURSOR ── */
.cur {
  display: inline-block; width: 2px; height: 13px;
  background: var(--gold); border-radius: 1px;
  margin-left: 1px; vertical-align: middle;
  animation: cblink .7s step-end infinite;
}
@keyframes cblink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── INPUT ── */
.input-zone {
  flex-shrink: 0;
  padding: 8px 20px 16px;
  background: linear-gradient(to top, var(--bg) 60%, transparent);
}

.input-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 8px 8px 8px 16px;
  display: flex; align-items: flex-end; gap: 6px;
  transition: border-color .2s, box-shadow .2s;
}
.input-wrap:focus-within {
  border-color: rgba(242,169,10,0.35);
  box-shadow: 0 0 0 3px rgba(242,169,10,0.05), 0 0 20px rgba(242,169,10,0.04);
}

#inp {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px;
  line-height: 1.55; resize: none; max-height: 160px; padding: 5px 0;
}
#inp::placeholder { color: var(--dim); }

.send-btn {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--gold2), var(--gold));
  border: none; cursor: pointer; color: #05080f;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
  box-shadow: 0 3px 12px rgba(242,169,10,0.28);
}
.send-btn:hover:not(:disabled) { transform: scale(1.08); box-shadow: 0 5px 18px rgba(242,169,10,0.45); }
.send-btn:active:not(:disabled) { transform: scale(.95); }
.send-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }

.input-hint { font-size: 11px; color: var(--dim); text-align: center; margin-top: 7px; }

/* ══════════════════ CONFIG OVERLAY ══════════════════ */
.overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(5,8,15,.93);
  backdrop-filter: blur(14px);
  display: flex; align-items: center; justify-content: center;
  animation: fadeUp .3s ease;
}
.overlay.off { display: none; }

.cfg-box {
  background: var(--panel);
  border: 1px solid rgba(242,169,10,0.1);
  border-radius: 20px; padding: 32px 28px;
  width: 100%; max-width: 400px;
  display: flex; flex-direction: column; gap: 18px;
  box-shadow: 0 30px 70px rgba(0,0,0,.6);
}

.cfg-logo { display: flex; align-items: center; gap: 10px; }
.cfg-logo svg { width: 38px; height: 38px; }
.cfg-logo-name {
  font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700;
  background: linear-gradient(120deg, var(--gold), var(--blue-soft));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.cfg-logo-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }

.cfg-sep { height: 1px; background: var(--border); }

.cfg-field { display: flex; flex-direction: column; gap: 5px; }
.cfg-label {
  font-size: 11px; font-weight: 600; letter-spacing: .07em;
  text-transform: uppercase; color: var(--muted);
}
.cfg-input {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 13px;
  color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px;
  outline: none; transition: border-color .2s, box-shadow .2s; width: 100%;
}
.cfg-input:focus { border-color: rgba(242,169,10,0.4); box-shadow: 0 0 0 3px rgba(242,169,10,0.06); }
.cfg-input::placeholder { color: var(--dim); }

.cfg-err { font-size: 12px; color: var(--red-text); display: none; }
.cfg-err.on { display: block; }

.cfg-btn {
  padding: 11px;
  background: linear-gradient(135deg, var(--gold2), var(--gold));
  border: none; border-radius: 11px;
  color: #05080f; font-family: 'Space Grotesk', sans-serif;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: all .2s; box-shadow: 0 4px 14px rgba(242,169,10,0.22);
}
.cfg-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(242,169,10,0.38); }
.cfg-btn:active { transform: translateY(0); }

.cfg-hint { font-size: 11px; color: var(--dim); text-align: center; line-height: 1.6; }

/* ── RESPONSIVE ── */
@media (max-width: 600px) { .sidebar { display: none; } .bubble { max-width: 88vw; } }
</style>
</head>
<body>

<canvas id="cv"></canvas>

<!-- CONFIG OVERLAY -->
<div class="overlay" id="overlay">
  <div class="cfg-box">
    <div class="cfg-logo">
      <svg viewBox="0 0 38 38" fill="none">
        <defs>
          <linearGradient id="lg0" x1="0" y1="0" x2="38" y2="38" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#F2A90A"/>
            <stop offset="100%" stop-color="#2B7FFF"/>
          </linearGradient>
        </defs>
        <path d="M19 2 L34 10.5 L34 27.5 L19 36 L4 27.5 L4 10.5 Z" fill="url(#lg0)"/>
        <path d="M19 8 L29 13.5 L29 24.5 L19 30 L9 24.5 L9 13.5 Z" fill="#05080f" opacity=".72"/>
        <text x="19" y="22.5" text-anchor="middle" font-family="Space Grotesk,sans-serif" font-size="12" font-weight="700" fill="#F2A90A">T</text>
      </svg>
      <div>
        <div class="cfg-logo-name">Tacotron</div>
        <div class="cfg-logo-sub">Connexion au serveur</div>
      </div>
    </div>

    <div class="cfg-sep"></div>

    <div class="cfg-field">
      <div class="cfg-label">Adresse du serveur</div>
      <input class="cfg-input" id="cfg-url" type="text" placeholder="Demander l'adresse IP à l'hébergeur" spellcheck="false" autocomplete="off"/>
    </div>

    <div class="cfg-field">
      <div class="cfg-label">Clé d'accès</div>
      <input class="cfg-input" id="cfg-key" type="password" placeholder="Demandez l'API key au propriétaire " spellcheck="false"/>
      <div class="cfg-err" id="cfg-err">Clé incorrecte ou serveur inaccessible.</div>
    </div>

    <button class="cfg-btn" onclick="doConnect()">Se connecter</button>
    <div class="cfg-hint">Demandez l&#39;adresse et la cl&#233; &#224; l&#39;h&#233;bergeur du serveur Tacotron.</div>
  </div>
</div>

<!-- APP -->
<div class="shell">
<div class="shell-inner">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 34 34" fill="none">
          <defs>
            <linearGradient id="lg1" x1="0" y1="0" x2="34" y2="34" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#F2A90A"/>
              <stop offset="100%" stop-color="#2B7FFF"/>
            </linearGradient>
          </defs>
          <path d="M17 1.5 L31 9.5 L31 25.5 L17 33.5 L3 25.5 L3 9.5 Z" fill="url(#lg1)"/>
          <path d="M17 7 L26 12 L26 22 L17 27 L8 22 L8 12 Z" fill="#05080f" opacity=".72"/>
          <text x="17" y="20.5" text-anchor="middle" font-family="Space Grotesk,sans-serif" font-size="11" font-weight="700" fill="#F2A90A">T</text>
        </svg>
        <div>
          <div class="logo-text">Tacotron</div>
          <div class="logo-sub">IA Locale</div>
        </div>
      </div>
    </div>

    <button class="new-btn" onclick="newChat()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Nouvelle conversation
    </button>

    <div class="sb-label">Récent</div>
    <div class="conv-list" id="conv-list"></div>

    <div class="sb-foot">
      <button class="sb-foot-btn" onclick="openConfig()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
        </svg>
        Serveur
      </button>
      <button class="sb-foot-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        Profil
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <header class="topbar">
      <div class="model-pill">
        <div class="mpulse"></div>
        <span class="mname">Tacotron</span>
        <span style="color:var(--dim)">· By Sanogo</span>
      </div>
      <div class="top-actions">
        <button class="icon-btn active" id="sb-toggle" title="Sidebar" onclick="toggleSidebar()">

const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
let pts = [];

function resizeCv() { cv.width = innerWidth; cv.height = innerHeight; }
resizeCv(); addEventListener('resize', resizeCv);

for (let i = 0; i < 55; i++) {
  pts.push({
    x: Math.random() * innerWidth,
    y: Math.random() * innerHeight,
    vx: (Math.random() - .5) * .15,
    vy: (Math.random() - .5) * .15,
    r: Math.random() * 1.2 + .3,
    a: Math.random() * .4 + .05,
    c: Math.random() > .5 ? '242,169,10' : '43,127,255'
  });
}

function drawPts() {
  cx.clearRect(0, 0, cv.width, cv.height);
  for (const p of pts) {
    p.x = (p.x + p.vx + cv.width)  % cv.width;
    p.y = (p.y + p.vy + cv.height) % cv.height;
    cx.beginPath();
    cx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    cx.fillStyle = `rgba(${p.c},${p.a})`;
    cx.fill();
  }
  for (let i = 0; i < pts.length; i++) {
    for (let j = i + 1; j < pts.length; j++) {
      const d = Math.hypot(pts[i].x - pts[j].x, pts[i].y - pts[j].y);
      if (d < 100) {
        cx.beginPath();
        cx.moveTo(pts[i].x, pts[i].y);
        cx.lineTo(pts[j].x, pts[j].y);
        cx.strokeStyle = `rgba(242,169,10,${.04 * (1 - d / 100)})`;
        cx.lineWidth = .5; cx.stroke();
      }
    }
  }
  requestAnimationFrame(drawPts);
}

// ══════════════════════════════════════════════════════
//  MARKDOWN RENDERER
// ══════════════════════════════════════════════════════
function md(text) {
  // code blocks first
  text = text.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, c) =>
    `<pre><code>${esc(c.trim())}</code></pre>`);
  // inline code
  text = text.replace(/`([^`\n]+)`/g, (_, c) => `<code>${esc(c)}</code>`);
  // bold / italic
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g,     '<em>$1</em>');
  // headings
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm,  '<h3>$1</h3>');
  // hr
  text = text.replace(/^---$/gm, '<hr>');
  // lists
  text = text.replace(/(^- .+(\n|$))+/gm, m =>
    '<ul>' + m.trim().split('\n').map(l => `<li>${l.replace(/^- /, '')}</li>`).join('') + '</ul>');
  // paragraphs (split on double newline, skip block elements)
  text = text.split(/\n\n+/).map(block => {
    if (/^<(ul|ol|pre|h3|hr)/.test(block.trim())) return block;
    return `<p>${block.replace(/\n/g, ' ')}</p>`;
  }).join('');
  return text;
}

function esc(s) {
  return String(s)

function finalizeAI(bubble, timeEl, fullText) {

  timeEl.removeAttribute('id');

// ══════════════════════════════════════════════════════
//  SEND
// ══════════════════════════════════════════════════════
async function send() {
  if (busy) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;

  inp.value = ''; grow(inp);
  busy = true;
  document.getElementById('send-btn').disabled = true;

  // Add to history + UI
  history.push({ role: 'user', content: text });
  addUser(text);

  // Auto-name conversation
  if (history.length === 1) {
    const id = Date.now();
    const title = text.length > 40 ? text.slice(0, 38) + '…' : text;
    convs.unshift({ id, title, on: true });
    convs.forEach((c, i) => c.on = i === 0);
    renderConvs();
  }

  addTyping();

  // ── Si pas de serveur configuré → fallback local Claude API ──────────
  if (!SERVER || !KEY) {
    await answerLocally(text);
    busy = false;
    document.getElementById('send-btn').disabled = false;
    inp.focus();
    return;
  }

  try {
    const resp = await fetch(SERVER + '/chat/stream', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + KEY
      },
      body: JSON.stringify({ messages: history })
    });

    removeTyping();

    if (!resp.ok) {
      const e = await resp.json().catch(() => ({}));
      // Serveur en erreur → fallback local
      await answerLocally(text);
    } else {
      // ── Stream SSE ──────────────────────────────────────────────────────
      const { bubble, timeEl } = addAI();
      const msgs = document.getElementById('msgs');

      let fullText = '';
      const reader = resp.body.getReader();
      const dec = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });

        const parts = buf.split('\n\n');
        buf = parts.pop();

        for (const part of parts) {
          const line = part.trim();
          if (!line.startsWith('data:')) continue;
          const raw = line.replace(/^data:\s*/, '');
          if (raw === '[DONE]') break;
          try {
            const { token } = JSON.parse(raw);
            if (token) {
              fullText += token;
              bubble.innerHTML = md(fullText) + '<span class="cur"></span>';
              msgs.scrollTop = msgs.scrollHeight;
            }
          } catch (_) {}
        }
      }

      finalizeAI(bubble, timeEl, fullText);
      history.push({ role: 'assistant', content: fullText });
    }

  } catch (e) {
    removeTyping();
    // Réseau inaccessible → fallback local
    await answerLocally(text);
  }

  busy = false;
  document.getElementById('send-btn').disabled = false;
  inp.focus();
}

// ── Moteur TF-IDF ──────────────────────────────────────
function tokenize(text) {
  return text.toLowerCase().replace(/[^\w\s]/g, "").split(/\s+/).filter(Boolean);
}

let vocab = new Set();
TrainingData.forEach(([q]) => tokenize(q).forEach(w => vocab.add(w)));
vocab = Array.from(vocab);

function df(word) {
  return TrainingData.filter(([q]) => tokenize(q).includes(word)).length;
}
function idf(word) {
  return Math.log(TrainingData.length / (1 + df(word)));
}
function tf(word, doc) {
  const words = tokenize(doc);
  return words.filter(w => w === word).length / (words.length || 1);
}
function vectorize(text) {
  return vocab.map(word => tf(word, text) * idf(word));
}
function cosine(a, b) {
  let dot = 0, magA = 0, magB = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i]; magA += a[i] * a[i]; magB += b[i] * b[i];
  }
  return dot / (Math.sqrt(magA) * Math.sqrt(magB) + 1e-10);
}

// Pre-calcul des vecteurs au chargement
const trainedVectors = TrainingData.map(([q, r]) => ({
  response: r,
  vector: vectorize(q)
}));

function findBestMatch(input) {
  const vec = vectorize(input);
  let bestResp = null, bestScore = -1;
  trainedVectors.forEach(item => {
    const score = cosine(vec, item.vector);
    if (score > bestScore) { bestScore = score; bestResp = item.response; }
  });
  return { response: bestResp, score: bestScore };
}

  const hint = document.createElement("div");
  hint.style.cssText = "margin: 4px 28px 16px; padding: 8px 14px; background: rgba(242,169,10,0.05); border: 1px solid rgba(242,169,10,0.15); border-radius: 10px; font-size: 12px; color: #6B778F; display: flex; align-items: center; gap: 8px;";
  hint.innerHTML = '<span style="color:#F2A90A">⚙</span>Réponse basique impossible de joindre le serveur de Sanogo. Configurez manuellement le serveur  pour acceder a toutes mes capacites. <button onclick="openConfig()" style="margin-left:auto;padding:4px 10px;background:rgba(242,169,10,0.12);border:1px solid rgba(242,169,10,0.3);border-radius:6px;color:#F2A90A;font-size:11px;cursor:pointer;font-family:Inter,sans-serif;">Configurer</button>';
  msgs.appendChild(hint);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── Reponse hors ligne ──────────────────────────────────
function offlineReply(text) {
  const { response, score } = findBestMatch(text);
  let reply = response || "Je fonctionne en mode basique. Connectez le serveur Qwen 2.5 pour des reponses completes.";

  // Gestion des reponses speciales dynamiques
  if (reply === "__DATETIME__") {
    const d = new Date();
    reply = "Nous sommes le " + d.toLocaleDateString("fr-FR", {weekday:"long", year:"numeric", month:"long", day:"numeric"}) + " a " + d.toLocaleTimeString("fr-FR", {hour:"2-digit", minute:"2-digit"}) + ".";
  } else if (reply === "__CALCUL__") {
    try {
      const expr = text.match(/[\d\s+\-*\/().]+/)?.[0];
      if (expr && expr.trim().length > 1) {
        const result = Function('"use strict"; return (' + expr.trim() + ')')();
        reply = expr.trim() + " = **" + result + "**";
      } else {
        reply = "Donnez-moi un calcul, exemple : 42 * 7";
      }
    } catch(e) { reply = "Je n ai pas pu effectuer ce calcul."; }
  }

  const { bubble, timeEl } = addAI();
  const msgs = document.getElementById("msgs");
  let i = 0;
  function typeNext() {
    if (i < reply.length) {
      i += 2;
      bubble.innerHTML = md(reply.slice(0, i)) + '<span class="cur"></span>';
      msgs.scrollTop = msgs.scrollHeight;
      setTimeout(typeNext, 10);
    } else {
      finalizeAI(bubble, timeEl, reply);
      history.push({ role: "assistant", content: reply });
      addServerHint();
    }
  }
  typeNext();
}

// ══════════════════════════════════════════════════════
//  FALLBACK (pas de serveur configure)
// ══════════════════════════════════════════════════════
async function answerLocally(userText) {
  removeTyping();
  offlineReply(userText);
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const btn = document.getElementById('sb-toggle');
  sb.classList.toggle('collapsed');
  btn.classList.toggle('active');
}
